  - key: height
    display_name: Height
    csv_column: Height
    type: string
    required: false
    labels:
      - height
    regex_patterns:
      - "\\b\\d\\s*(?:ft|feet|'|’)?\\s*\\d{0,2}\\s*(?:in|inch|inches|\\\")?\\b"
      - "\\b\\d{2,3}\\s*cm\\b"

  - key: weight
