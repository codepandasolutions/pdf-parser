fields:
  - key: full_name
    display_name: Full Name
    csv_column: Full Name
    type: string
    required: true
    labels:
      - name
      - full name
      - candidate name
      - bride name
      - groom name
      - applicant name
      - profile name
    regex_patterns: []
    cleanup:
      trim: true
      collapse_spaces: true
    confidence:
      label_match: 0.9
      regex_match: 0.8

  - key: gender
    display_name: Gender
    csv_column: Gender
    type: string
    required: false
    labels:
      - gender
      - sex
    regex_patterns: []

  - key: date_of_birth
    display_name: Date of Birth
    csv_column: DOB
    type: date
    required: false
    labels:
      - dob
      - d.o.b
      - d.o.b.
      - date of birth
      - birth date
      - born on
      - janam tarikh
    regex_patterns:
      - "\\b\\d{1,4}[./-]\\d{1,2}[./-]\\d{1,4}\\b"
      - "\\b\\d{1,2}(?:st|nd|rd|th)?\\s+(?:Jan|January|Feb|February|Mar|March|Apr|April|May|Jun|June|Jul|July|Aug|August|Sep|Sept|September|Oct|October|Nov|November|Dec|December),?\\s+\\d{2,4}\\b"
    cleanup:
      normalize_date: true

  - key: age
    display_name: Age
    csv_column: Age
    type: string
    required: false
    labels:
      - age
    regex_patterns:
      - "\\b\\d{1,2}\\b"

  - key: birth_time
    display_name: Birth Time
    csv_column: Birth Time
