name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install pyinstaller
      - name: Run tests
        run: pytest
      - name: Build Windows app
        run: pyinstaller app.py --name BiodataParser --windowed
      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path dist/BiodataParser/* -DestinationPath dist/BiodataParser-windows.zip
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BiodataParser-windows.zip
          generate_release_notes: true
